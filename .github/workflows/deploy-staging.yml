# Phase 6: DevOps & Monitoring - Staging Deployment
# Deploys to Firebase staging environment on push to develop branch

name: Deploy to Staging

on:
  push:
    branches: [ develop, dev ]
  pull_request:
    branches: [ develop ]
    types: [ opened, synchronize ]

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  # Job 1: Code Quality Checks
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos

      - name: Run custom lints
        run: |
          flutter pub run dart_code_metrics:metrics analyze lib \
            --fatal-style --fatal-performance --fatal-warnings || true

  # Job 2: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --coverage --test-randomize-ordering-seed=random

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Flutter Tests
          path: test-results.json
          reporter: flutter-json

  # Job 3: Build Android APK
  build-android:
    name: Build Android (Staging)
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Firebase CLI
        uses: w9jds/setup-firebase@main
        with:
          tools-version: 13.0.3
          gcp_SA_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.STAGING_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STAGING_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.STAGING_KEY_PASSWORD }}
          keyAlias=${{ secrets.STAGING_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build Staging APK
        run: |
          flutter build apk \
            --flavor staging \
            --target lib/main_staging.dart \
            --build-number ${{ github.run_number }} \
            --build-name "1.0.0+${{ github.run_number }}"
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_STAGING }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-apk
          path: build/app/outputs/flutter-apk/app-staging-release.apn
          retention-days: 7

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-staging-release.apk --app ${{ secrets.FIREBASE_APP_ID_STAGING }} --groups "qa-team, developers"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

  # Job 4: Deploy Firebase Resources
  deploy-firebase:
    name: Deploy Firebase Resources
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13.0.3

      - name: Deploy Firestore Rules
        run: |
          firebase deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_STAGING }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Deploy Firestore Indexes
        run: |
          firebase deploy --only firestore:indexes --project ${{ secrets.FIREBASE_PROJECT_STAGING }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Deploy Storage Rules
        run: |
          firebase deploy --only storage --project ${{ secrets.FIREBASE_PROJECT_STAGING }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Functions
        working-directory: functions
        run: npm run build

      - name: Deploy Functions
        run: |
          firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_STAGING }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Deploy Hosting (if configured)
        run: |
          firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_STAGING }} || echo "No hosting configured"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

  # Job 5: Notify Team
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [build-android, deploy-firebase]
    if: always()
    steps:
      - name: Notify Slack - Success
        if: ${{ needs.build-android.result == 'success' && needs.deploy-firebase.result == 'success' }}
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: '✅ Staging deployment successful! Build #${{ github.run_number }}'
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack - Failure
        if: ${{ needs.build-android.result == 'failure' || needs.deploy-firebase.result == 'failure' }}
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          text: '❌ Staging deployment failed! Build #${{ github.run_number }}'
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
