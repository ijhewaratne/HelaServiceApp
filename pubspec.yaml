name: home_service_app
description: "HelaService - Sri Lankan Home Services Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  loading_indicator: ^3.1.1
  
  # Firebase - Compatible versions
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  cloud_functions: ^5.3.4
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.4
  firebase_performance: ^0.10.1+4
  firebase_app_check: ^0.3.2+4
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1
  
  # Routing
  go_router: ^13.0.1
  
  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  # Note: geofire packages conflict with cloud_firestore ^5.x
  # Using custom geohash implementation in location_service.dart
  
  # Media
  image_picker: ^1.0.7
  # image_cropper: ^5.0.1  # Web incompatible, use conditional import
  
  # Payments (Sri Lanka)
  # flutter_payhere: ^3.0.0  # Temporarily disabled - use local integration
  
  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Chat
  flutter_chat_ui: ^1.6.10
  
  # Utils
  intl: ^0.20.2
  
  # Localization
  flutter_localizations:
    sdk: flutter
  uuid: ^4.2.2
  get_it: ^7.6.4
  dartz: ^0.10.1
  logger: ^2.0.2
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  local_auth: ^2.1.8
  crypto: ^3.0.7
  encrypt: ^5.0.3
  path_provider: ^2.1.1
  # record: ^4.4.4  # Temporarily disabled - audio recording not critical for MVP
  geofence_service: ^6.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7
  bloc_test: ^9.1.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/fonts/
  
  # fonts:
  #   - family: NotoSansSinhala
  #     fonts:
  #       - asset: assets/fonts/NotoSansSinhala-Regular.ttf
  #       - asset: assets/fonts/NotoSansSinhala-Bold.ttf
  #         weight: 700
